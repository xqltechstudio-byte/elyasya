<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - Elyasya Corp</title>
    <link rel="stylesheet" href="admin-styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="logo elyasya Corp.jpeg" alt="Elyasya Corp" class="login-logo">
                <h1>Admin Panel</h1>
                <p>Elyasya Corp Dashboard</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">👁️</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Ingat saya</span>
                    </label>
                </div>
                
                <div id="loginError" class="error-message" style="display:none;">
                    ❌ Username atau password salah!
                </div>
                
                <button type="submit" class="btn-login">
                    <span>Masuk ke Dashboard</span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>&copy; 2026 Elyasya Corp. All Rights Reserved.</p>
                <a href="index.html">← Kembali ke Website</a>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ADMIN AUTHENTICATION SYSTEM
        // ==========================================
        
        // Default admin credentials (change this after first login!)
        const DEFAULT_ADMIN = {
            username: 'admin',
            // Simple hash for demo - in production use proper hashing
            passwordHash: btoa('admin123'), // base64 encode
            name: 'Administrator'
        };

        // Initialize admin account if not exists
        function initAdminAccount() {
            if (!localStorage.getItem('adminAccount')) {
                localStorage.setItem('adminAccount', JSON.stringify(DEFAULT_ADMIN));
            }
        }

        // Check if already logged in
        function checkExistingSession() {
            const session = localStorage.getItem('adminSession');
            if (session) {
                try {
                    const data = JSON.parse(session);
                    // Session expires in 24 hours
                    if (Date.now() - data.loginTime < 24 * 60 * 60 * 1000) {
                        window.location.href = 'admin-dashboard.html';
                        return true;
                    } else {
                        localStorage.removeItem('adminSession');
                    }
                } catch (e) {
                    localStorage.removeItem('adminSession');
                }
            }
            return false;
        }

        // Simple hash function
        function simpleHash(str) {
            return btoa(str);
        }

        // Login handler
        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            
            // Get admin account
            const adminData = JSON.parse(localStorage.getItem('adminAccount') || '{}');
            
            // Verify credentials
            if (username === adminData.username && simpleHash(password) === adminData.passwordHash) {
                // Create session
                const session = {
                    username: adminData.username,
                    name: adminData.name,
                    loginTime: Date.now(),
                    rememberMe: rememberMe
                };
                
                localStorage.setItem('adminSession', JSON.stringify(session));
                
                // Redirect to dashboard
                window.location.href = 'admin-dashboard.html';
            } else {
                errorEl.style.display = 'block';
                errorEl.textContent = '❌ Username atau password salah!';
                
                // Shake animation
                const card = document.querySelector('.login-card');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        }

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initAdminAccount();
            
            if (!checkExistingSession()) {
                document.getElementById('loginForm').addEventListener('submit', handleLogin);
            }
        });
    </script>
</body>
</html>
